spring:
  application:
    name: prueba-tecnica

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

    jpa:
      show-sql: true
      database-platform: org.hibernate.dialect.H2Dialect
      hibernate:
        ddl-auto: create
        format_sql: true


    h2:
      console:
        enabled: true
        path: /h2-console

validation:
  password-regex: "^(?=.*[A-Z])(?=.*\\d)[A-Za-z\\d]{8,}$"

security:
  jwt:
    key:
      private: LLAVEPRUEBATEST
    user:
      generator: USERPRUEBATEST
    expired: 1800000